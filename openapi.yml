openapi: 3.0.3
info:
  title: Dummy App Service API
  description: >
    Dummy App Service API v1.0.0
    This release introduces a breaking change by making the `currency`
    field mandatory in order creation requests.
  version: v1.0.0
  contact:
    name: Dummy API Team
    email: api@dummyapp.dev

servers:
  - url: https://api.dummyapp.dev/v2
    description: Production server (v2)

tags:
  - name: Users
    description: User management APIs
  - name: Orders
    description: Order processing APIs
  - name: Health
    description: Service health APIs

security:
  - ApiKeyAuth: []

paths:
  /users:
    post:
      tags:
        - Users
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /orders:
    post:
      tags:
        - Orders
      summary: Create an order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequestV2"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderV2"
        "400":
          description: Invalid order data
        "401":
          description: Unauthorized

  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order details
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderV2"
        "401":
          description: Unauthorized
        "404":
          description: Order not found

  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    CreateUserRequest:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
          format: email
        name:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateOrderRequestV2:
      type: object
      required:
        - customerId
        - totalAmount
        - currency   # 🚨 BREAKING CHANGE: now required
      properties:
        customerId:
          type: string
        totalAmount:
          type: number
          minimum: 0.01
        currency:
          type: string
          example: USD

    OrderV2:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum:
            - CREATED
            - CONFIRMED
            - SHIPPED
            - COMPLETED
        createdAt:
          type: string
          format: date-time

    HealthStatus:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time